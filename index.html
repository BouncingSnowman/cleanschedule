<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veckoplan — Schemaläggning för städföretag</title>
    <meta name="description" content="Enkel och smidig schemaläggning för städföretag. Hantera anställda, kunder och jobb i en veckokalender.">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#080d1a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=23">
</head>
<body>
    <div id="app">
        <!-- Mobile Header (hidden on desktop) -->
        <header id="mobile-header" class="mobile-header">
            <button id="mobile-menu-btn" class="btn-icon" aria-label="Meny">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span class="mobile-title">Veckoplan</span>
        </header>

        <!-- Sidebar -->
        <nav id="sidebar">
            <div class="sidebar-logo">
                <button id="sidebar-collapse-btn" class="btn-icon sidebar-collapse-btn" title="Dölj meny">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <span class="logo-icon">✨</span>
                <span class="logo-text">Veckoplan</span>
            </div>
            <ul class="sidebar-nav">
                <li>
                    <button class="nav-btn active" data-view="dashboard" id="nav-dashboard">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        Översikt
                    </button>
                </li>
                <li>
                    <button class="nav-btn" data-view="schedule" id="nav-schedule">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        Schema
                    </button>
                </li>
                <li id="nav-unscheduled-item" class="hidden">
                    <button class="nav-btn" data-view="schedule" id="nav-unscheduled">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                        <span class="nav-label">Oplanerade</span>
                        <span class="unscheduled-nav-badge" id="nav-unscheduled-badge">0</span>
                    </button>
                </li>
                <li>
                    <button class="nav-btn" data-view="employees" id="nav-employees">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        Anställda
                    </button>
                </li>
                <li>
                    <button class="nav-btn" data-view="customers" id="nav-customers">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        Kunder
                    </button>
                </li>
                <li>
                    <button class="nav-btn" data-view="settings" id="nav-settings">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        Inställningar
                    </button>
                </li>
            </ul>
            <div class="sidebar-actions">
                <button id="btn-export" class="sidebar-action-btn" title="Exportera data">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Exportera
                </button>
                <button id="btn-import" class="sidebar-action-btn" title="Importera data">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Importera
                </button>
                <button id="btn-print" class="sidebar-action-btn" title="Skriv ut schema">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                    Skriv ut
                </button>
                <button id="btn-logout" class="sidebar-action-btn" title="Logga ut">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logga ut
                </button>
            </div>
            <input type="file" id="import-file-input" accept=".json" hidden>
            <button class="theme-toggle" id="btn-theme" title="Växla mörkt/ljust läge">
                <span class="theme-toggle-icon" id="theme-icon">🌙</span>
                <span id="theme-label">Mörkt läge</span>
            </button>
            <div class="sidebar-footer">
                <div class="user-badge">
                    <div class="user-avatar">👤</div>
                    <span class="user-name">Admin</span>
                </div>
            </div>
        </nav>

        <!-- Auth View (shown when not logged in) -->
        <section id="view-auth" class="auth-view hidden">
            <div id="auth-content"></div>
        </section>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay hidden">
            <div class="loading-spinner"></div>
            <p>Laddar data...</p>
        </div>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Dashboard View -->
            <section id="view-dashboard" class="view active">
                <header class="view-header">
                    <h1>Översikt</h1>
                </header>
                <div id="dashboard-content" class="dashboard-grid">
                    <!-- Rendered by JS -->
                </div>
            </section>

            <!-- Schedule View -->
            <section id="view-schedule" class="view">
                <header class="view-header">
                    <div class="week-nav">
                        <button id="btn-prev-week" class="btn-icon" title="Föregående vecka">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                        </button>
                        <h1 id="week-title" class="week-title">Vecka 13 — 24–30 mars 2026</h1>
                        <button id="btn-next-week" class="btn-icon" title="Nästa vecka">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                        <button id="btn-today" class="btn-secondary">Idag</button>
                        <button id="btn-fullscreen" class="btn-icon" title="Helskärm">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                        </button>
                    </div>
                    <button id="btn-add-job" class="btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Nytt jobb
                    </button>
                </header>
                <div class="schedule-layout">
                    <div class="schedule-grid-wrapper">
                        <div id="schedule-grid" class="schedule-grid">
                            <!-- Rendered by JS -->
                        </div>
                    </div>
                    <aside class="unscheduled-panel" id="unscheduled-panel">
                        <div class="unscheduled-header">
                            <button class="unscheduled-toggle-btn" id="btn-toggle-panel" title="Dölj/visa panel">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
                            </button>
                            <h2>Oplanerade jobb <span class="unscheduled-badge" id="unscheduled-count">0</span></h2>
                            <button class="btn-primary btn-sm" id="btn-add-unscheduled">+ Nytt</button>
                        </div>
                        <div class="unscheduled-search">
                            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" id="unscheduled-search" class="search-input" placeholder="Sök kund eller adress...">
                        </div>
                        <div id="unscheduled-list" class="unscheduled-list">
                            <!-- Rendered by JS -->
                        </div>
                    </aside>
                </div>
                <div id="day-timeline" class="day-timeline">
                    <!-- Rendered by JS -->
                </div>
            </section>

            <!-- Employees View -->
            <section id="view-employees" class="view">
                <header class="view-header">
                    <h1>Anställda</h1>
                    <button id="btn-add-employee" class="btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Lägg till anställd
                    </button>
                </header>
                <div id="employees-list" class="card-list">
                    <!-- Rendered by JS -->
                </div>
            </section>

            <!-- Customers View -->
            <section id="view-customers" class="view">
                <header class="view-header">
                    <div class="header-left">
                        <h1>Kunder</h1>
                        <div class="search-box">
                            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" id="customer-search" class="search-input" placeholder="Sök kund...">
                        </div>
                    </div>
                    <button id="btn-add-customer" class="btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Lägg till kund
                    </button>
                    <button id="btn-import-csv" class="btn-secondary" title="Importera kunder från Spiris CSV">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        Importera CSV
                    </button>
                    <input type="file" id="csv-file-input" accept=".csv" hidden>
                </header>
                <div id="customers-list" class="card-list">
                    <!-- Rendered by JS -->
                </div>
            </section>

            <!-- Settings View -->
            <section id="view-settings" class="view">
                <header class="view-header">
                    <h1>Inställningar</h1>
                </header>
                <div id="settings-content">
                    <!-- Rendered by JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Mobile overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal" class="modal">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button id="modal-close" class="btn-icon modal-close-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Dynamic content -->
            </div>
            <div id="modal-footer" class="modal-footer">
                <!-- Dynamic buttons -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <span id="toast-message"></span>
    </div>

    <script type="module" src="src/supabase.js?v=23"></script>
    <script type="module" src="src/auth.js?v=23"></script>
    <script type="module" src="src/store.js?v=23"></script>
    <script type="module" src="src/modals.js?v=23"></script>
    <script type="module" src="src/employees.js?v=23"></script>
    <script type="module" src="src/customers.js?v=23"></script>
    <script type="module" src="src/calendar.js?v=23"></script>
    <script type="module" src="src/dashboard.js?v=23"></script>
    <script type="module" src="src/settings.js?v=23"></script>
    <script type="module" src="src/main.js?v=23"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/cleanschedule/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
